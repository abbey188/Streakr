name: sync-live

# Triggers the live sync on a schedule (Vercel Hobby crons only run once/day, so
# we drive the near-real-time sync from here instead). GitHub's minimum is ~5 min
# and timing can drift a little — fine for results/notifications/leaderboards,
# since the match you're watching polls TxLINE directly every 10s.
#
# Setup: add two repository secrets (Settings → Secrets and variables → Actions):
#   APP_URL      = https://<your-app>.vercel.app   (no trailing slash)
#   CRON_SECRET  = same value as in Vercel env
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # lets you run it manually from the Actions tab

# If a run is still going when the next fires, skip rather than pile up.
concurrency:
  group: sync-live
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/cron/sync-live
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then echo "APP_URL secret not set"; exit 1; fi
          curl -fsS -X POST "$APP_URL/api/cron/sync-live" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 90
